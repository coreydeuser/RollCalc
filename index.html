<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RollCalc</title>

<style>
:root{
--bg:#0c0c0d;--panel:#151517;--panel2:#1c1c1f;--border:#2a2a2f;
--text:#f3f3f4;--muted:#9ea0a8;--accent:#d62f2f;--good:#1f9b50;
}

*{box-sizing:border-box;max-width:100%}

html,body{
margin:0;
padding:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
overflow-x:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.app{
width:100%;
max-width:420px;
padding:16px;
text-align:center;
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:16px;
padding:14px;
}

label{font-size:12px;color:var(--muted)}

input{
width:100%;
height:48px;
border-radius:12px;
border:1px solid var(--border);
background:var(--panel2);
color:white;
padding:0 12px;
text-align:center;
font-size:16px;
margin-top:6px;
display:block;
}

input[type="date"]{
-webkit-appearance:none;
appearance:none;
}

.result{
margin-top:12px;
background:rgba(31,155,80,.15);
border:1px solid rgba(31,155,80,.4);
border-radius:12px;
padding:12px;
font-size:28px;
font-weight:900;
}

button{
width:100%;
height:48px;
border-radius:12px;
border:none;
margin-top:8px;
font-weight:700;
}

.primary{background:var(--accent);color:white}
.ghost{background:#222;color:white}
</style>
</head>

<body>
<div class="app">
<h2>RollCalc</h2>

<div class="card">

<label>Roll Name</label>
<input id="name">

<label>Date</label>
<input type="date" id="date">

<label>OD</label>
<input id="od">

<label>ID</label>
<input id="id">

<label>Thickness</label>
<input id="th">

<div class="result" id="result">0.00 ft</div>

<button class="primary" onclick="save()">Save</button>
<button class="ghost" onclick="clearAll()">Clear</button>

</div>

<div id="history"></div>
</div>

<script>
function num(v){return parseFloat(v)||0}

function calc(){
let od=num(od.value)
let id=num(id.value)
let t=num(th.value)
if(!od||!t||od<=id)return 0
return (Math.PI*(od*od-id*id))/(4*t)/12
}

function update(){
result.innerText=calc().toFixed(2)+' ft'
}

function save(){
let data=JSON.parse(localStorage.getItem('rolls')||'[]')
data.push({name:name.value,feet:calc().toFixed(2)})
localStorage.setItem('rolls',JSON.stringify(data))
render()
}

function render(){
let data=JSON.parse(localStorage.getItem('rolls')||'[]')
history.innerHTML=data.map(d=>'<div>'+d.name+' - '+d.feet+' ft</div>').join('')
}

function clearAll(){
localStorage.removeItem('rolls')
render()
}

od.oninput=id.oninput=th.oninput=update

render()
</script>

</body>
</html>
