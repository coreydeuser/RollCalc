<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RollCalc" />
  <title>RollCalc</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{
      --bg:#0c0c0d; --panel:#151517; --panel2:#1c1c1f; --border:#2a2a2f;
      --text:#f3f3f4; --muted:#9ea0a8; --accent:#d62f2f; --good:#1f9b50;
      --radius:18px; --shadow:0 10px 28px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;overflow-x:hidden;
    }
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .app{
      width:100%;
      max-width:440px;
      padding:calc(14px + env(safe-area-inset-top)) 12px calc(20px + env(safe-area-inset-bottom));
      text-align:center;
    }
    .top{margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.55rem, 5vw, 2rem);line-height:1}
    .sub{margin:6px auto 0;color:var(--muted);font-size:.9rem;line-height:1.3;max-width:360px}
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:12px;
    }
    .field{margin-bottom:10px;text-align:center}
    label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:6px}
    input{
      width:100%;
      min-height:50px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel2);
      color:var(--text);
      padding:0 13px;
      font-size:1rem;
      text-align:center;
      outline:none;
      display:block;
    }
    input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(214,47,47,.15);
    }
    input.capture-ready{
      border-color:rgba(31,155,80,.65);
      box-shadow:0 0 0 3px rgba(31,155,80,.16);
    }
    input[type="date"]{
      -webkit-appearance:none;
      appearance:none;
      max-width:100%;
      overflow:hidden;
    }
    .capture-row{
      display:flex;
      gap:6px;
      justify-content:center;
      flex-wrap:wrap;
      margin:4px 0 10px;
    }
    .capture-chip{
      background:#17171a;
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 9px;
      font-size:.74rem;
      color:var(--muted);
      cursor:pointer;
      line-height:1.1;
    }
    .capture-chip.active{
      border-color:rgba(31,155,80,.65);
      color:#d6ffd8;
    }
    .result{
      margin-top:6px;
      background:linear-gradient(180deg, rgba(31,155,80,.16), rgba(31,155,80,.08));
      border:1px solid rgba(31,155,80,.38);
      border-radius:16px;
      padding:16px 12px;
      text-align:center;
    }
    .k{color:var(--muted);font-size:.82rem;margin-bottom:6px}
    .v{font-size:clamp(1.9rem, 8vw, 2.7rem);font-weight:900;line-height:1}
    .save-note{margin-top:8px;min-height:1.1em;color:#bbf4bf;font-size:.86rem}
    .note{margin-top:8px;color:var(--muted);font-size:.82rem;line-height:1.35}
    .warn{margin-top:6px;min-height:1.1em;color:#ffb1b1;font-size:.82rem;line-height:1.35}
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:12px;
    }
    button{
      min-height:48px;
      border-radius:14px;
      font-weight:800;
      font-size:.96rem;
      cursor:pointer;
    }
    .primary{background:var(--accent);color:#fff;border:none}
    .secondary{background:#242428;color:var(--text);border:1px solid var(--border)}
    .ghost{background:#17171a;color:var(--muted);border:1px solid var(--border)}
    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:2px;
    }
    .tiny{
      min-height:36px;
      padding:0 11px;
      font-size:.88rem;
      border-radius:12px;
    }
    .history-item{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:11px;
      margin-top:10px;
      text-align:center;
    }
    .name{font-size:1rem;font-weight:900;line-height:1.15}
    .date{font-size:.84rem;color:var(--muted);margin-top:4px}
    .feet{font-size:1.08rem;font-weight:900;color:#d6ffd8;margin-top:7px}
    .meta{
      display:grid;
      grid-template-columns:1fr;
      gap:6px;
      margin-top:10px;
      color:var(--muted);
      font-size:.83rem;
    }
    .empty{text-align:center;color:var(--muted);padding:18px 8px}
    @media (max-width:560px){.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>RollCalc</h1>
    </div>

    <div class="card">
      <div class="field">
        <label for="rollName">Roll Name</label>
        <input id="rollName" placeholder="Example: 3M Gloss Black" />
      </div>

      <div class="field">
        <label for="rollDate">Date</label>
        <input id="rollDate" type="date" />
      </div>

      <div class="field">
        <label for="od">Outside Diameter (OD)</label>
        <input id="od" inputmode="decimal" autocomplete="off" placeholder="Example: 5.75" />
      </div>

      <div class="field">
        <label for="id">Inside Diameter (ID)</label>
        <input id="id" inputmode="decimal" autocomplete="off" placeholder="Example: 3.00" />
      </div>

      <div class="field">
        <label for="thickness">Material Thickness (inches)</label>
        <input id="thickness" inputmode="decimal" autocomplete="off" placeholder="Example: 0.003" />
      </div>

      <div class="capture-row">
        <div class="capture-chip" id="chip-od">OD</div>
        <div class="capture-chip" id="chip-id">ID</div>
        <div class="capture-chip" id="chip-thickness">Thickness</div>
      </div>

      <div class="result">
        <div class="k">Length Remaining</div>
        <div class="v" id="feetResult">0.00 ft</div>
      </div>

      <div class="save-note" id="saveNote"></div>
      <div class="note">All measurements are in inches.</div>
      <div class="warn" id="warningText"></div>

      <div class="actions">
        <button class="primary" id="saveBtn" type="button">Save Roll</button>
        <button class="secondary" id="exportBtn" type="button">Export CSV</button>
        <button class="ghost" id="clearBtn" type="button">Clear</button>
        <button class="ghost" id="installBtn" type="button">Install Help</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div style="font-weight:900;font-size:1.05rem;">Saved Rolls</div>
        <button class="ghost tiny" id="clearHistoryBtn" type="button">Clear All</button>
      </div>
      <div id="history"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
